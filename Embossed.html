<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShaderToy Kaleidoscope - Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .control-panel { pointer-events: auto; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); width: 300px; }
        .slider-container { margin-bottom: 10px; }
        input[type=range] { width: 100%; accent-color: #00ffcc; cursor: pointer; }
        label { display: flex; justify-content: space-between; font-size: 0.8rem; color: #aaa; margin-bottom: 4px; }
        .value-display { color: #fff; font-weight: bold; }
        h1 { font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; color: #00ffcc; text-transform: uppercase; letter-spacing: 2px; }
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ffcc; font-size: 24px; animation: blink 1s infinite; z-index: 20; pointer-events: none; transition: opacity 0.5s; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="loading" class="loading">INITIALIZING SHADERS...</div>

    <div id="ui-layer">
        <div class="control-panel shadow-2xl">
            <h1>Kaleidoscope // Control</h1>
            
            <div class="slider-container">
                <label>Iterations <span id="val-iter" class="value-display">35</span></label>
                <input type="range" id="iterations" min="1" max="60" value="35" step="1">
            </div>

            <div class="slider-container">
                <label>Zoom Sensitivity <span id="val-zoom" class="value-display">0.30</span></label>
                <input type="range" id="zoom" min="0.1" max="1.0" value="0.3" step="0.01">
            </div>

            <div class="slider-container">
                <label>Color Shift <span id="val-color" class="value-display">0.00</span></label>
                <input type="range" id="colorShift" min="0" max="6.28" value="0" step="0.1">
            </div>

            <div class="slider-container">
                <label>Light Intensity <span id="val-light" class="value-display">1.50</span></label>
                <input type="range" id="lightInt" min="0" max="5.0" value="1.5" step="0.1">
            </div>
            
            <div class="text-xs text-gray-500 mt-4">
                Move mouse to zoom & pan.<br>
                Based on ShaderToy: fl33z8
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform vec3 iResolution;
        uniform float iTime;
        uniform vec4 iMouse;
        uniform sampler2D iChannel0;
        
        // UI Uniforms
        uniform float uIterations;
        uniform float uZoomBase;
        uniform float uColorShift;
        uniform float uLightInt;

        varying vec2 vUv;

        #define R iResolution.xy

        // Mirror function for kaleidoscope effect
        void mirror(inout vec2 p){
            p = fract(p)-0.5;
            // Using floor and mod logic to create the tiling/mirroring
            // Optimized slightly for GLSL strictness
            vec2 id = floor(p + 0.5); // Adjust to get correct integer grid
            
            // Check parity using mod
            if(mod(id.x, 2.0) < 0.5) p.x *= -1.;
            if(mod(id.y, 2.0) < 0.5) p.y *= -1.;
        }

        // Helper for texture sampling (simulating Shadertoy's texture calls)
        vec3 t(vec2 p){
            // Clamp to avoid edge artifacts
            return texture2D(iChannel0, clamp(p, 0.0, 1.0)).xyz;   
        }

        float height(vec2 p){
            return t(p).r;
        }

        vec3 bump(vec2 uv, float strength){
            float h = 0.004;
            float dx = height(uv) - height(uv + vec2(h, .0));
            float dy = height(uv) - height(uv + vec2(0., h));
            return normalize( vec3(0., 0., -1.) + vec3(dx, dy, 0.)*strength);
        }

        void main() {
            // Coordinate setup
            vec2 u = vUv * iResolution.xy;
            vec2 uv = u / R;
            
            // --- SCENE 1: KALEIDOSCOPE (The Pattern Generator) ---
            // We render this into a temporary variable 'patternUV' or similar logic
            // But here we mix it directly.
            
            vec2 patternUV = uv;
            
            // Mouse interaction logic (Zoom)
            // iMouse.z is 1.0 if clicked, but we treat hover as interaction here for smoother web feel
            float mouseZoom = 1.0;
            vec2 mousePos = iMouse.xy / R;
            
            // If mouse is roughly active (moved from center)
            if(iMouse.z > 0.0 || length(iMouse.xy) > 0.0) {
                 // Simple distance based zoom for effect
                 float dist = length(mousePos - 0.5);
                 mouseZoom = 1.0 + (0.5 - mousePos.y) * 2.0; 
            }

            // Apply base zoom from UI
            patternUV -= .5;
            patternUV *= uZoomBase * (mouseZoom * 0.5 + 0.5); 
            patternUV.x *= 2.0; // Aspect ratio correction
            patternUV += .5;

            // Animation
            patternUV.x -= 200.; // Large offset
            patternUV += .4*vec2(cos(iTime*.3)*.3, -iTime*0.05);
            
            // Rotation
            patternUV = (patternUV + vec2(-patternUV.y, patternUV.x)) / 1.4;
            mirror(patternUV);

            // Iterative Fractal Transformation
            float a = -.093;
            vec2 v = vec2(cos(a), sin(a));
            
            // Use uniform for iteration count
            float loopCount = uIterations;
            
            for(float i = 0.; i < 60.0; i++){
                if(i >= loopCount) break;
                
                patternUV -= .5;
                patternUV *= 1.1; // Scale up
                patternUV += .74; // Offset
                
                patternUV = abs(patternUV - .5);
                patternUV.x -= .505;
                
                // Reflection vector logic
                float dotProd = dot(patternUV, v);
                patternUV -= v * min(0., dotProd) * 2.;
            }

            // Coloring based on pattern
            float k = (dot(patternUV, patternUV))*18. + 3.;
            float t_val = 1.8*(patternUV.x*2. + patternUV.y*3.);
            
            // Apply color shift
            vec3 col = .5+.6*cos(vec3(2.4, 2., 5.)*t_val + k*.6 + uColorShift);
            
            // Texture mixing (using the generated noise texture)
            col -= .3*t(patternUV*.5);
            col += .2*t(patternUV*0.4);
            
            // Color mixing based on time
            col = mix(col.bbb, col.ggg, .5+.5*sin(iTime*.5 + dot(patternUV, patternUV)*12.));
            
            col = clamp(col, .25, .9);
            col = 1.-exp(-col); // Tone mapping

            // --- SCENE 2: LIGHTING (Bump Mapping) ---
            // We use the color generated above as the "Object Color" and "Height Map"
            
            vec2 nuv = vec2(u.xy - 0.5*R.xy)/R.y; // Normalized UV for lighting calc
            
            // Light Position animation
            vec3 lp = vec3(cos(iTime*.5)*.1, sin(iTime*.5)*.1, -1.0);
            vec3 sp = vec3(nuv, 0.0); // Surface point
            vec3 ro = vec3(0, 0, -1.0); // Ray Origin
            vec3 rd = normalize(sp - ro); // Ray Direction
            vec3 ld = lp - sp; // Light Direction vector

            float dist = max(length(ld), 0.001);
            ld /= dist;

            // Use the calculated color as the base object color
            vec3 objCol = col * vec3(.99, .95, .9);
            
            // Calculate Normal based on the visual pattern (using uv, not patternUV for stability)
            vec3 norm = bump(uv, 5.);
            
            // Diffuse
            float dif = max(dot(norm, ld), 0.);  
            
            // Specular
            float spec = pow(max(dot( reflect(-ld, norm), -rd), 0.), 16.); 
            
            // Falloff
            float fal = uLightInt / (dist*dist); // UI controlled intensity

            // Final Composition
            vec3 finalCol = (objCol*(dif + .2))*fal;
            finalCol += vec3(0.6, 0.6, 0.6)*spec*.12*fal;
            
            // Post processing
            finalCol = pow(finalCol*1.5, vec3(1.6));
            
            // Vignette
            finalCol *= smoothstep(0.8, .35, abs(nuv.y));

            gl_FragColor = vec4(finalCol, 1.0);
        }
    </script>

    <script>
        // --- 1. Setup Scene ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- 2. Generate Procedural Texture (Noise) ---
        // This replaces the need for iChannel0 external assets
        function createNoiseTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            const imgData = ctx.createImageData(size, size);
            const data = imgData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                const val = Math.random() * 255;
                data[i] = val;     // R
                data[i+1] = val;   // G
                data[i+2] = val;   // B
                data[i+3] = 255;   // A
            }
            
            ctx.putImageData(imgData, 0, 0);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        const noiseTexture = createNoiseTexture();

        // --- 3. Shader Uniforms ---
        const uniforms = {
            iTime: { value: 0 },
            iResolution: { value: new THREE.Vector3(window.innerWidth, window.innerHeight, 1) },
            iMouse: { value: new THREE.Vector4(0, 0, 0, 0) },
            iChannel0: { value: noiseTexture },
            
            // UI Controlled Uniforms
            uIterations: { value: 35.0 },
            uZoomBase: { value: 0.3 },
            uColorShift: { value: 0.0 },
            uLightInt: { value: 1.5 }
        };

        // --- 4. Create Mesh ---
        const geometry = new THREE.PlaneGeometry(2, 2);
        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent
        });

        const plane = new THREE.Mesh(geometry, material);
        scene.add(plane);

        // --- 5. Interaction Logic ---
        let mouseX = 0;
        let mouseY = 0;
        let targetMouseX = 0;
        let targetMouseY = 0;

        document.addEventListener('mousemove', (e) => {
            // Normalize mouse to 0..1
            targetMouseX = e.clientX / window.innerWidth;
            targetMouseY = 1.0 - (e.clientY / window.innerHeight); // Flip Y for GLSL
        });

        // UI Event Listeners
        document.getElementById('iterations').addEventListener('input', (e) => {
            uniforms.uIterations.value = parseFloat(e.target.value);
            document.getElementById('val-iter').innerText = e.target.value;
        });
        document.getElementById('zoom').addEventListener('input', (e) => {
            uniforms.uZoomBase.value = parseFloat(e.target.value);
            document.getElementById('val-zoom').innerText = e.target.value;
        });
        document.getElementById('colorShift').addEventListener('input', (e) => {
            uniforms.uColorShift.value = parseFloat(e.target.value);
            document.getElementById('val-color').innerText = e.target.value;
        });
        document.getElementById('lightInt').addEventListener('input', (e) => {
            uniforms.uLightInt.value = parseFloat(e.target.value);
            document.getElementById('val-light').innerText = e.target.value;
        });

        // --- 6. Resize Handler ---
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.iResolution.value.set(window.innerWidth, window.innerHeight, 1);
        });

        // Hide loader
        setTimeout(() => {
            document.getElementById('loading').style.opacity = 0;
        }, 1000);

        // --- 7. Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            uniforms.iTime.value = elapsedTime;

            // Smooth mouse movement
            mouseX += (targetMouseX - mouseX) * 0.1;
            mouseY += (targetMouseY - mouseY) * 0.1;
            
            // Update uniforms (zw components usually for click drag delta, here we just use xy)
            uniforms.iMouse.value.set(mouseX * window.innerWidth, mouseY * window.innerHeight, 0, 0);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
